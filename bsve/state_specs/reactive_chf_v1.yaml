# bsve/state_specs/reactive_chf_v1.yaml

environment:
  id: "reactive_chf"
  version: "1.0.0"
  family: "reactive"
  subfamily: "chf"
  pairs:
    - "USDCHF"
    - "EURCHF"
  timeframe: "H1"
  sentiment_required: true

dataset_windows:
  full_range:
    start: "2012-01-01"
    end: "2026-12-31"
  dl_active_range:
    start: "2019-01-01"
    end: "2026-12-31"

feature_sets:
  structural:
    - "atr_pct"
    - "atr_pct_rolling_median_24"
    - "atr_pct_rolling_median_96"
  sentiment:
    - "net_sentiment"
    - "abs_sentiment"
    - "crowd_side"
  state_derived:
    - "volatility_regime"
    - "persistence_bars"

threshold_placeholders:
  low_vol_threshold_atr_pct: null
  high_vol_threshold_atr_pct: null
  persistence_boundary_bars: null

states:
  - state_id: "CHF_LOW_VOL_PERSISTENT"
    description: "Low-volatility state with persistent crowd positioning."
    entry_conditions:
      volatility_regime: "low"
      sentiment_extreme_flag: true
  - state_id: "CHF_LOW_VOL_NON_PERSISTENT"
    description: "Low-volatility control state without persistence."
    entry_conditions:
      volatility_regime: "low"
      sentiment_extreme_flag: false
  - state_id: "CHF_ELEVATED_VOL_REACTIVE"
    description: "High-volatility reactive state under extreme sentiment."
    entry_conditions:
      volatility_regime: "high"
      sentiment_extreme_flag: true
  - state_id: "CHF_MEDIUM_VOL_TRANSITIONAL"
    description: "Medium-volatility transitional control state."
    entry_conditions:
      volatility_regime: "medium"
  - state_id: "CHF_NON_EXTREME"
    description: "Control state when sentiment is not extreme."
    entry_conditions:
      sentiment_extreme_flag: false
